name: Node.js Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Sửa cảnh báo: Ép các Actions chạy trên Node.js 24 theo chuẩn mới của GitHub
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # Nâng cấp lên Node 24 luôn cho đồng bộ
        cache: 'npm'

    - name: Install dependencies
      run: npm install # Nếu lệnh 'npm ci' trước đó bị lỗi, đổi thành 'npm install' sẽ linh hoạt hơn

    - name: Run build
      # CI=false để ép GitHub bỏ qua các cảnh báo code thừa (như biến chưa dùng) gây sập build
      run: CI=false npm run build

name: Node.js Build

# Kích hoạt khi có hành động push hoặc pull request vào nhánh main (hoặc master)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Lấy code từ repo về máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Bước 2: Cài đặt môi trường Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Bạn có thể đổi thành phiên bản Node bạn đang dùng (18, 22...)
        cache: 'npm'     # Cache lại node_modules để lần sau build nhanh hơn

    # Bước 3: Cài đặt các thư viện (dependencies)
    - name: Install dependencies
      run: npm ci        # Lệnh này giống npm install nhưng tối ưu và sạch hơn cho môi trường build

    # Bước 4: Chạy lệnh build
    - name: Run build
      run: npm run build
